const BATCH = 50;

function log(msg, type='info') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += '<div class="' + type + '">' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}

async function startImport() {
  const btn = document.getElementById('btn');
  const progress = document.getElementById('progress');
  const bar = document.getElementById('bar');
  btn.disabled = true;
  btn.textContent = 'Important...';
  progress.style.display = 'block';
  
  // Get current session
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    log('❌ No has iniciat sessió. Obre primer la app i inicia sessió.', 'err');
    btn.disabled = false;
    btn.textContent = 'Iniciar importació';
    return;
  }
  
  log('✓ Sessió detectada: ' + session.user.email, 'ok');
  log('Inserint ' + ENTRIES.length + ' entrades en lots de ' + BATCH + '...', 'info');
  
  let ok = 0, errors = 0;
  
  for (let i = 0; i < ENTRIES.length; i += BATCH) {
    const batch = ENTRIES.slice(i, i + BATCH);
    try {
      const { error } = await sb.from('entries').insert(batch);
      if (error) {
        log('❌ Lot ' + (i/BATCH+1) + ': ' + error.message, 'err');
        errors += batch.length;
      } else {
        ok += batch.length;
        const pct = Math.round(ok / ENTRIES.length * 100);
        bar.style.width = pct + '%';
        log('✓ Lot ' + (i/BATCH+1) + ': ' + ok + '/' + ENTRIES.length + ' entrades (' + pct + '%)', 'ok');
      }
    } catch(e) {
      log('❌ Error: ' + e.message, 'err');
      errors += batch.length;
    }
    await new Promise(r => setTimeout(r, 200));
  }
  
  if (errors === 0) {
    log('🎉 Importació completada! ' + ok + ' entrades inserides correctament.', 'ok');
    btn.textContent = '✓ Importació completada';
  } else {
    log('⚠️ ' + ok + ' inserides, ' + errors + ' errors.', 'err');
    btn.disabled = false;
    btn.textContent = 'Reintentar';
  }
}
