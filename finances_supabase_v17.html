<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; max-width: 100vw; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

#config-banner { background: #fff3cd; border-bottom: 1px solid #ffc107; padding: 10px 20px; font-size: 13px; color: #856404; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
#config-banner input { flex: 1; min-width: 200px; padding: 6px 10px; border: 1px solid #ffc107; border-radius: 6px; font-size: 16px; background: white; }
#config-banner button { background: #ffc107; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: #1a1a1a; white-space: nowrap; }
#config-banner.hidden { display: none; }

header { background: white; border-bottom: 1px solid #e5e5e5; padding: 0 16px; position: sticky; top: 0; z-index: 100; width: 100%; }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 0; gap: 8px; min-width: 0; }
h1 { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.header-btns { display: flex; gap: 6px; }
.sync-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #666; }
.sync-btn:hover { background: #f5f5f5; }
.sync-btn:disabled { opacity: 0.5; pointer-events: none; }
.cfg-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 16px; color: #666; }
.cfg-btn:hover { background: #f5f5f5; }

.month-nav { display: flex; align-items: center; gap: 8px; padding: 8px 0; flex-wrap: wrap; width: 100%; }
.month-nav select { font-size: 16px; padding: 5px 8px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #1a1a1a; cursor: pointer; min-width: 0; flex-shrink: 1; }
.month-nav .nav-summary-btn { padding: 5px 12px; font-size: 13px; cursor: pointer; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #666; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
.month-nav .nav-summary-btn:hover, .month-nav .nav-summary-btn.active { background: #2563eb; color: white; border-color: #2563eb; }

main { max-width: 960px; margin: 0 auto; padding: 16px; width: 100%; }
#loader { text-align: center; padding: 60px 20px; color: #888; }
.spinner { width: 32px; height: 32px; border: 3px solid #e5e5e5; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.metric { background: white; border-radius: 10px; padding: 12px 10px; border: 1px solid #e5e5e5; min-width: 0; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 4px; line-height: 1.3; }
.metric-value { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media (max-width: 600px) { 
  .metric-grid { grid-template-columns: repeat(2, 1fr) !important; } 
  .metric-value { font-size: 14px; } 
  .metric-label { font-size: 10px; }
}
.green { color: #16a34a; } .red { color: #dc2626; } .blue { color: #2563eb; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; min-width: 0; }
@media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } .metric-grid { gap: 8px; } }
.two-col > * { min-width: 0; overflow: hidden; }
.panel { background: white; border-radius: 10px; border: 1px solid #e5e5e5; padding: 16px; min-width: 0; max-width: 100%; }
.panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.panel-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }

table { width: 100%; font-size: 13px; border-collapse: collapse; }
th { text-align: left; color: #888; font-weight: 400; padding: 6px 6px; border-bottom: 1px solid #f0f0f0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
td { padding: 6px 6px; border-bottom: 1px solid #f5f5f5; vertical-align: top; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
td.amount { text-align: right; font-weight: 600; font-size: 13px; white-space: nowrap; vertical-align: middle; }
td.ref-col { color: #1a1a1a; font-size: 12px; max-width: 160px; }
.ref-text { display: block; color: #1a1a1a; }
.ref-date { display: block; font-size: 11px; color: #bbb; margin-top: 2px; }
.cat-pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; vertical-align: middle; }
.del-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 13px; padding: 0 4px; transition: color 0.1s; }
tr:hover .del-btn { color: #bbb; }
.del-btn:hover { color: #dc2626 !important; }

.add-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #444; }
.add-btn:hover { background: #f9f9f9; }
.detail-btn { background: none; border: 1px solid #e5e5e5; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #666; white-space: nowrap; }
.detail-btn:hover { background: #f5f5f5; }

.form-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
.form-row select, .form-row input { flex: 1; min-width: 90px; font-size: 16px; padding: 7px 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #1a1a1a; }
.save-btn { background: #2563eb; color: white; border: none; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; }
.save-btn:hover { background: #1d4ed8; }
.save-btn:disabled { opacity: 0.5; pointer-events: none; }
.cancel-btn { background: none; border: 1px solid #e0e0e0; color: #888; padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
.hidden { display: none; }

.bar-chart-outer { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.bar-chart-inner { height: 250px; }
.chart-wrap { position: relative; width: 100%; height: 210px; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.hidden { display: none; }
.modal { background: white; border-radius: 14px; width: 100%; max-width: 440px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; border-radius: 14px 14px 0 0; }
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; padding: 2px 6px; border-radius: 6px; line-height: 1; }
.modal-close:hover { background: #f5f5f5; color: #1a1a1a; }
.modal-body { padding: 8px 20px 20px; overflow-y: auto; flex: 1; }
.modal-back { background: none; border: none; color: #2563eb; font-size: 13px; cursor: pointer; padding: 8px 0 4px; display: flex; align-items: center; gap: 4px; }

.cat-detail-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; border-radius: 6px; }
.cat-detail-row:hover { background: #f9f9f9; }
.cat-detail-row:last-of-type { border-bottom: none; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-detail-name { flex: 1; font-size: 13px; }
.cat-detail-meta { font-size: 11px; color: #aaa; margin-right: 4px; white-space: nowrap; }
.cat-detail-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
.cat-detail-arrow { color: #ccc; font-size: 13px; flex-shrink: 0; }
.modal-total { display: flex; justify-content: space-between; padding: 12px 0 4px; border-top: 1px solid #e5e5e5; margin-top: 4px; font-weight: 600; font-size: 14px; }

.payment-row { padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
.payment-row:last-child { border-bottom: none; }
.payment-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.payment-ref { font-size: 13px; color: #1a1a1a; flex: 1; }
.payment-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
.payment-date { font-size: 11px; color: #bbb; margin-top: 3px; }

.cfg-section { margin-bottom: 24px; }
.cfg-section-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.cfg-cat-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
.cfg-cat-row:last-child { border-bottom: none; }
.cfg-cat-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.cfg-cat-name { flex: 1; font-size: 13px; }
.cfg-cat-edit { background: none; border: 1px solid #e5e5e5; padding: 3px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; color: #666; }
.cfg-cat-edit:hover { background: #f5f5f5; }
.cfg-cat-del { background: none; border: none; color: #ddd; cursor: pointer; font-size: 15px; padding: 0 4px; }
.cfg-cat-del:hover { color: #dc2626; }
.cfg-add-row { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; align-items: center; }
.cfg-add-row input[type="text"] { flex: 1; font-size: 16px; padding: 7px 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #1a1a1a; }
.cfg-add-row input[type="color"] { width: 40px; height: 36px; padding: 2px 3px; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; }
.cfg-edit-form { background: #f9f9f9; border-radius: 8px; padding: 10px; margin-top: 4px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.cfg-edit-form input[type="text"] { flex: 1; min-width: 100px; font-size: 16px; padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 6px; background: white; }
.cfg-edit-form input[type="color"] { width: 36px; height: 32px; padding: 2px 3px; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; }
.cfg-sync-note { font-size: 12px; color: #aaa; padding: 6px 0 2px; text-align: center; }
.lang-selector { display: flex; gap: 8px; margin-bottom: 20px; }
.lang-btn { flex: 1; padding: 8px; border: 1px solid #e5e5e5; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; color: #666; transition: all 0.15s; }
.lang-btn:hover { background: #f5f5f5; }
.lang-btn.active { border-color: #2563eb; color: #2563eb; font-weight: 600; background: #eff6ff; }

.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f5f5f5;}
.toggle-label{font-size:13px;color:#1a1a1a;}
.toggle-sub{font-size:11px;color:#aaa;margin-top:2px;}
.toggle-switch{position:relative;width:44px;height:26px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#e0e0e0;border-radius:26px;cursor:pointer;transition:0.2s;}
.toggle-slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.2s;}
input:checked+.toggle-slider{background:#2563eb;}
input:checked+.toggle-slider:before{transform:translateX(18px);}

#toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: white; padding: 10px 18px; border-radius: 10px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; max-width: 280px; }
#toast.show { opacity: 1; }
#toast.error { background: #dc2626; }
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#f5f5f0;}
.auth-card{background:white;border-radius:16px;border:1px solid #e5e5e5;padding:32px;width:100%;max-width:380px;}
.auth-logo{font-size:26px;font-weight:700;margin-bottom:6px;}
.auth-sub{font-size:14px;color:#888;margin-bottom:28px;}
.auth-tabs{display:flex;margin-bottom:24px;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden;}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;cursor:pointer;background:white;border:none;color:#666;}
.auth-tab.active{background:#2563eb;color:white;font-weight:500;}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:12px;font-weight:500;color:#666;margin-bottom:5px;}
.auth-field input{width:100%;padding:10px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:16px;}
.auth-field input:focus{outline:none;border-color:#2563eb;}
.auth-btn{width:100%;background:#2563eb;color:white;border:none;padding:11px;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px;}
.auth-btn:hover{background:#1d4ed8;}
.auth-btn:disabled{opacity:0.6;pointer-events:none;}
.auth-msg{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;}
.auth-msg.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;}
.auth-msg.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;}
.logout-btn{background:none;border:1px solid #e5e5e5;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:#888;}
.logout-btn:hover{background:#f5f5f5;color:#dc2626;}
.user-email-badge{font-size:11px;color:#aaa;padding:8px 0 14px;border-bottom:1px solid #f0f0f0;margin-bottom:16px;}
</style>
</head>

<div id="auth-screen" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">💰 MyFinanceApp</div>
    <div class="auth-sub">Gestiona les teves finances personals</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Registrar-se</button>
    </div>
    <div id="auth-msg" style="display:none" class="auth-msg"></div>
    <div class="auth-field"><label>Email</label><input type="email" id="auth-email" placeholder="el-teu@email.com"></div>
    <div class="auth-field"><label>Contrasenya</label><input type="password" id="auth-password" placeholder="••••••••"></div>
    <div class="auth-field" id="confirm-field" style="display:none"><label>Confirmar contrasenya</label><input type="password" id="auth-confirm" placeholder="••••••••"></div>
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">Entrar</button>
  </div>
</div>
<div id="app-screen" style="display:none">
<div id="config-banner" class="hidden"></div>

<header>
  <div class="header-top">
    <h1 id="app-title">Finances Personals 2026</h1>
    <div class="header-btns">
      <button class="sync-btn" id="sync-btn" onclick="loadAll()">Sincronitzar</button>
      <button class="cfg-btn" onclick="openCfgModal()" title="Settings">&#9881;</button>
      <button class="logout-btn" id="logout-btn" onclick="handleLogout()">&#x2192;</button>
    </div>
  </div>
  <div class="month-nav" id="month-nav"></div>
</header>

<main id="main">
  <div id="loader"><div class="spinner"></div><p id="loader-text">Connectant...</p></div>
</main>

</div><!-- /app-screen -->
<div id="toast"></div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModalDirect()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="cfg-overlay" onclick="closeCfgOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:480px">
    <div class="modal-header">
      <h3 id="cfg-title">Configuració</h3>
      <button class="modal-close" onclick="document.getElementById('cfg-overlay').classList.add('hidden')">&#x2715;</button>
    </div>
    <div class="modal-body" id="cfg-body"></div>
  </div>
</div>

const LANG_IDX = {ca:0, es:1, en:2};

function translateCat(catName, fromLang, toLang) {
  if (fromLang === toLang) return catName;
  const fromIdx = LANG_IDX[fromLang];
  const toIdx = LANG_IDX[toLang];
  // Check despeses
  for (const row of CAT_TRANS) {
    if (row[fromIdx] === catName) return row[toIdx];
  }
  // Check ingressos
  for (const row of ING_TRANS) {
    if (row[fromIdx] === catName) return row[toIdx];
  }
  return catName; // untranslated, keep original
}

function translateColorMap(colorMap, fromLang, toLang) {
  if (fromLang === toLang) return colorMap;
  const newMap = {};
  Object.entries(colorMap).forEach(([cat, color]) => {
    const translated = translateCat(cat, fromLang, toLang);
    newMap[translated] = color;
  });
  return newMap;
}

function translateAllData(fromLang, toLang) {
  if (fromLang === toLang) return;
  ALL_MONTHS.forEach(m => {
    if (!appData[m]) return;
    appData[m].desp.forEach(r => { r.cat = translateCat(r.cat, fromLang, toLang); });
    appData[m].ing.forEach(r => { r.cat = translateCat(r.cat, fromLang, toLang); });
  });
}

function t(key, vars) {
  let s = T[key] || key;
  if (vars) Object.entries(vars).forEach(([k,v]) => { s = s.replace('{{'+k+'}}', v); });
  return s;
}
function getMonthLabel(idx) { return T.months[idx]; }
function getAllLabels() {
  const labels = { 'Resum': T.tabSummary };
  getActiveMonths().forEach((m,i) => { labels[m] = T.monthAbr ? T.monthAbr[i] : T.months[i].substring(0,3); });
  return labels;
}

function fmt(n) { return (parseFloat(n)||0).toFixed(2)+'€'; }
function fmtSign(n,isDesp) { return (isDesp?'-':'+')+fmt(n); }
function sum(arr) { return (arr||[]).reduce((a,b)=>a+(parseFloat(b.amount)||0),0); }
function getByCat(arr) {
  const m={};
  (arr||[]).forEach(r=>{m[r.cat]=(m[r.cat]||0)+r.amount;});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function getCountByCat(arr) {
  const m={};
  (arr||[]).forEach(r=>{
    if(!m[r.cat])m[r.cat]={total:0,count:0,items:[]};
    m[r.cat].total+=r.amount;m[r.cat].count++;m[r.cat].items.push(r);
  });
  return Object.entries(m).sort((a,b)=>b[1].total-a[1].total);
}
function collectAllForType(months,type) {
  const all=[];
  months.forEach(m=>(appData[m]&&appData[m][type]||[]).forEach(r=>all.push(r)));
  return all;
}
function destroyCharts(){Object.values(charts).forEach(c=>c.destroy());charts={};}
function toggleForm(id){document.getElementById(id).classList.toggle('hidden');}
function todayStr(){
  const d=new Date();
  return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
}

function normalizeDate(raw) {
  if (!raw) return '';
  // Already in DD/MM/YYYY format
  if (typeof raw === 'string' && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(raw)) return raw;
  // Try parsing as a date object or string
  const d = new Date(raw);
  if (!isNaN(d.getTime())) {
    return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
  }
  // Return first 10 chars as fallback
  return String(raw).substring(0,10);
}

function setLanguage(lang, reload=true) {
  currentLang = lang;
  T = TRANSLATIONS[lang];
  localStorage.setItem('appLang', lang);
  if (reload) {
    applyStaticTranslations();
    buildNav();
    render();
  }
}

function applyStaticTranslations(){
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('app-title',T.appTitle);set('sync-btn',T.sync);set('cfg-title',T.configTitle);
  document.documentElement.lang=currentLang;
}

window.onload = async () => {
  T=TRANSLATIONS[currentLang];
  const now=new Date();activeYear=now.getFullYear();activeTab=MONTH_KEYS[now.getMonth()]+activeYear;
  applyStaticTranslations();buildNav();
  const{data:{session}}=await sb.auth.getSession();
  if(session){currentUser=session.user;showApp();}
  sb.auth.onAuthStateChange((_,s)=>{if(s&&s.user&&!currentUser){currentUser=s.user;showApp();}});
  document.getElementById('auth-email').addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});
  document.getElementById('auth-password').addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});
};

function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('logout-btn').style.display='';
  loadAll();
}
function switchAuthTab(mode){
  authMode=mode;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='register')));
  document.getElementById('confirm-field').style.display=mode==='register'?'':'none';
  document.getElementById('auth-btn').textContent=mode==='login'?'Entrar':'Crear compte';
  document.getElementById('auth-msg').style.display='none';
}
async function handleAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-password').value;
  const btn=document.getElementById('auth-btn');
  if(!email||!pass){showAuthMsg('Omple tots els camps',true);return;}
  if(pass.length<6){showAuthMsg('Mínim 6 caràcters',true);return;}
  if(authMode==='register'){const conf=document.getElementById('auth-confirm').value;if(pass!==conf){showAuthMsg('Les contrasenyes no coincideixen',true);return;}}
  btn.disabled=true;btn.textContent=authMode==='login'?'Entrant...':'Creant compte...';
  try{
    if(authMode==='login'){
      const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)throw error;currentUser=data.user;showApp();
    }else{
      const{data,error}=await sb.auth.signUp({email,password:pass});
      if(error)throw error;
      if(data.session){currentUser=data.user;showApp();}
      else{showAuthMsg('Compte creat! Ja pots entrar.',false);btn.disabled=false;btn.textContent='Crear compte';switchAuthTab('login');}
    }
  }catch(err){showAuthMsg(err.message,true);btn.disabled=false;btn.textContent=authMode==='login'?'Entrar':'Crear compte';}
}
function showAuthMsg(msg,isError){const el=document.getElementById('auth-msg');el.textContent=msg;el.className='auth-msg '+(isError?'error':'success');el.style.display='';}
async function handleLogout(){
  await sb.auth.signOut();currentUser=null;appData={};
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('logout-btn').style.display='none';
}

function buildNav() {
  const container = document.getElementById('month-nav');
  if (!container) return;
  const currentYear = new Date().getFullYear();
  const years = [];
  for (let y = 2025; y <= currentYear + 2; y++) years.push(y);
  const yearOpts = years.map(y => '<option value="'+y+'"'+(y===activeYear?' selected':'')+'>'+y+'</option>').join('');
  const monthOpts = T.months.map(function(m,i) {
    const key = MONTH_KEYS[i]+activeYear;
    return '<option value="'+key+'"'+(activeTab===key?' selected':'')+'>'+m+'</option>';
  }).join('');
  container.innerHTML =
    '<button class="nav-summary-btn'+(activeTab==='Resum'?' active':'')+'" onclick="setTab(\'Resum\')">'+T.tabSummary+'</button>'+
    '<select id="year-sel" style="font-size:16px" onchange="setYear(parseInt(this.value))">'+yearOpts+'</select>'+
    '<select id="month-sel" style="font-size:16px" onchange="setTab(this.value)">'+monthOpts+'</select>';
}

function setYear(year) {
  activeYear = year;
  getMonthsForYear(year).forEach(function(m){ if(!appData[m]) appData[m]={ing:[],desp:[],inv:[]}; });
  activeTab = MONTH_KEYS[new Date().getMonth()]+year;
  buildNav();
  render();
}

function setTab(tab) {
  activeTab = tab;
  if (tab !== 'Resum') {
    // extract year from tab key e.g. 'Abril2026' -> 2026
    const yr = parseInt(tab.replace(/[^0-9]/g,''));
    if (yr && yr !== activeYear) {
      activeYear = yr;
      getMonthsForYear(yr).forEach(function(m){ if(!appData[m]) appData[m]={ing:[],desp:[],inv:[]}; });
    }
  }
  buildNav();
  render();
}

async function loadAll(){
  if(!currentUser)return;
  const btn=document.getElementById('sync-btn');
  if(btn){btn.disabled=true;btn.textContent=T.syncing;}
  try{
    const{data:cats}=await sb.from('user_categories').select('*').eq('user_id',currentUser.id).maybeSingle();
    if(cats){
      if(cats.desp_colors&&Object.keys(cats.desp_colors).length>0)CAT_COLORS=translateColorMap(cats.desp_colors,'ca',currentLang);
      if(cats.ing_colors&&Object.keys(cats.ing_colors).length>0)ING_COLORS=translateColorMap(cats.ing_colors,'ca',currentLang);
      if(cats.inv_colors&&Object.keys(cats.inv_colors).length>0)INV_COLORS=Object.assign({},cats.inv_colors);
    }
    const{data:entries,error}=await sb.from('entries').select('*').eq('user_id',currentUser.id);
    if(error)throw error;
    appData={};
    getMonthsForYear(activeYear).forEach(m=>{appData[m]={ing:[],desp:[],inv:[]};});
    (entries||[]).forEach(e=>{
      if(!appData[e.month])appData[e.month]={ing:[],desp:[],inv:[]};
      if(e.type==='inv'){
        const p=(e.ref||'').split('|');
        appData[e.month].inv.push({id:e.id,cat:e.cat,amount:parseFloat(e.amount),opType:p[0]==='sell'?'sell':'buy',ref:p.slice(1).join('|'),date:e.date||''});
      }else{
        const cat=translateCat(e.cat,'ca',currentLang);
        appData[e.month][e.type].push({id:e.id,cat,amount:parseFloat(e.amount),ref:e.ref||'',date:e.date||''});
      }
    });
    render();showToast(T.synced);
  }catch(err){
    showToast((T.errorDeleting||'Error: ')+err.message,true);
    getMonthsForYear(activeYear).forEach(m=>{if(!appData[m])appData[m]={ing:[],desp:[],inv:[]};});
    render();
  }finally{if(btn){btn.disabled=false;btn.textContent=T.sync;}}
}

async function addEntry(sheet,type){
  const cat=document.getElementById(type+'-cat').value;
  const amt=parseFloat(document.getElementById(type+'-amt').value);
  const ref=document.getElementById(type+'-ref').value;
  const btn=document.getElementById(type+'-save-btn');
  if(!amt||isNaN(amt)||amt<=0){showToast(T.invalidAmount,true);return;}
  btn.disabled=true;btn.textContent=T.save;
  const date=todayStr();const catCA=translateCat(cat,currentLang,'ca');
  try{
    const{data,error}=await sb.from('entries').insert({user_id:currentUser.id,month:sheet,type,cat:catCA,amount:amt,ref,date}).select().single();
    if(error)throw error;
    if(!appData[sheet])appData[sheet]={ing:[],desp:[],inv:[]};
    appData[sheet][type].push({id:data.id,cat,amount:amt,ref,date});
    document.getElementById(type+'-amt').value='';document.getElementById(type+'-ref').value='';
    render();showToast(T.added);
  }catch(err){showToast(T.errorSaving+err.message,true);}
  finally{btn.disabled=false;btn.textContent=T.save;}
}

async function deleteEntry(sheet,type,idx){
  if(!confirm(T.confirmDeleteEntry))return;
  const entry=appData[sheet][type][idx];
  if(!entry||!entry.id)return;
  try{
    const{error}=await sb.from('entries').delete().eq('id',entry.id);
    if(error)throw error;
    appData[sheet][type].splice(idx,1);render();showToast(T.deleted);
  }catch(err){showToast(T.errorDeleting+err.message,true);}
}

async function addInvestment(sheet){

async function deleteInvestment(sheet,idx){

function renderCfgSection(type, colorMap, label) {
  const rows = Object.entries(colorMap).map(([cat,color]) =>
    '<div class="cfg-cat-row" id="cfgrow-'+type+'-'+btoa(unescape(encodeURIComponent(cat)))+'">'+
      '<div class="cfg-cat-dot" style="background:'+color+'"></div>'+
      '<div class="cfg-cat-name">'+cat+'</div>'+
      '<button class="cfg-cat-edit" onclick="editCat(\''+type+'\',\''+cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'+T.edit+'</button>'+
      '<button class="cfg-cat-del" onclick="deleteCat(\''+type+'\',\''+cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">&#x2715;</button>'+
    '</div>'
  ).join('');

  return '<div class="cfg-section">'+
    '<div class="cfg-section-title">'+label+'</div>'+
    rows+
    '<div class="cfg-add-row">'+
      '<input type="color" id="new-color-'+type+'" value="#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0')+'">'+
      '<input type="text" id="new-cat-'+type+'" placeholder="'+T.addCategory+'">'+
      '<button class="save-btn" onclick="addCat(\''+type+'\')">'+T.add+'</button>'+
    '</div>'+
  '</div>';
}

function editCat(type, cat) {
  const colorMap = getColorMap(type);
  const color = colorMap[cat]||'#888';
  const rowId = 'cfgrow-'+type+'-'+btoa(unescape(encodeURIComponent(cat)));
  const row = document.getElementById(rowId);
  if (!row) return;
  const existing = row.nextElementSibling;
  if (existing&&existing.classList.contains('cfg-edit-form')) { existing.remove(); return; }
  const form = document.createElement('div');
  form.className = 'cfg-edit-form';
  form.innerHTML =
    '<input type="color" id="edit-color-'+type+'" value="'+color+'">'+
    '<input type="text" id="edit-name-'+type+'" value="'+cat+'">'+
    '<button class="save-btn" style="padding:5px 12px;font-size:12px" onclick="saveCatEdit(\''+type+'\',\''+cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'+T.save+'</button>'+
    '<button class="cancel-btn" style="padding:5px 10px;font-size:12px" onclick="this.parentElement.remove()">&#x2715;</button>';
  row.insertAdjacentElement('afterend', form);
}

async function saveCatEdit(type, oldCat) {
  const colorMap = getColorMap(type);
  const newName = document.getElementById('edit-name-'+type).value.trim();
  const newColor = document.getElementById('edit-color-'+type).value;
  if (!newName) { showToast(T.catNameEmpty, true); return; }
  delete colorMap[oldCat];
  colorMap[newName] = newColor;
  Object.keys(appData).forEach(m => {
    if (appData[m]) {
      const arr = type==='inv'?appData[m].inv:type==='desp'?appData[m].desp:appData[m].ing;
      (arr||[]).forEach(r => { if (r.cat===oldCat) r.cat=newName; });
    }
  });
  await syncCategories();
  renderCfgModal();
  render();
  showToast(T.catUpdated);
}

async function deleteCat(type, cat) {
  if (!confirm(T.confirmDelete.replace('{{cat}}', cat))) return;
  const colorMap = getColorMap(type);
  delete colorMap[cat];
  await syncCategories();
  renderCfgModal();
  render();
  showToast(T.catDeleted);
}

async function addCat(type) {
  const colorMap = getColorMap(type);
  const name = document.getElementById('new-cat-'+type).value.trim();
  const color = document.getElementById('new-color-'+type).value;
  if (!name) { showToast(T.catEmpty, true); return; }
  if (colorMap[name]) { showToast(T.catExists, true); return; }
  colorMap[name] = color;
  await syncCategories();
  renderCfgModal();
  render();
  showToast(T.catAdded);
}

function toggleInvestments(v){
  investEnabled=v;
  localStorage.setItem('investEnabled',v?'true':'false');
  render();
}


// ---- DETAIL MODAL ----
function showCatDetail(type, months) {
  modalState = {type, months};
  const isDesp = type==='desp';
  const colorMap = isDesp?CAT_COLORS:ING_COLORS;
  const allEntries = collectAllForType(months, type);
  const cats = getCountByCat(allEntries);
  const grandTotal = cats.reduce((s,e)=>s+e[1].total, 0);

  let rows = '';
  cats.forEach(entry => {
    const cat=entry[0]; const v=entry[1];
    const color=colorMap[cat]||'#888';
    const pct=grandTotal>0?(v.total/grandTotal*100).toFixed(1):0;
    rows += '<div class="cat-detail-row" onclick="showCatPayments(\''+cat.replace(/'/g,"\\'")+'\')">'+
      '<div class="cat-dot" style="background:'+color+'"></div>'+
      '<div class="cat-detail-name">'+cat+'</div>'+
      '<div class="cat-detail-meta">'+v.count+' '+T.reg+' &middot; '+pct+'%</div>'+
      '<div class="cat-detail-amount" style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(v.total,isDesp)+'</div>'+
      '<div class="cat-detail-arrow">&#8250;</div>'+
    '</div>';
  });

  const totalRow = rows?'<div class="modal-total"><span>'+T.total+'</span><span style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(grandTotal,isDesp)+'</span></div>':'';
  document.getElementById('modal-title').textContent = isDesp?T.despByCat:T.ingByCat;
  document.getElementById('modal-body').innerHTML = rows?rows+totalRow:'<p style="color:#aaa;font-size:13px;padding:8px 0">'+T.noData+'</p>';
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function showCatPayments(cat) {
  if (!modalState) return;
  const {type, months} = modalState;
  const isDesp = type==='desp';
  const color = (isDesp?CAT_COLORS:ING_COLORS)[cat]||'#888';
  const allEntries = collectAllForType(months, type).filter(r=>r.cat===cat);
  const total = sum(allEntries);

  let rows = '';
  allEntries.forEach(r => {
    rows += '<div class="payment-row">'+
      '<div class="payment-top">'+
        '<div class="payment-ref">'+r.ref+'</div>'+
        '<div class="payment-amount" style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(r.amount,isDesp)+'</div>'+
      '</div>'+
      (r.date?'<div class="payment-date">'+r.date+'</div>':'')+
    '</div>';
  });

  const totalRow = '<div class="modal-total"><span>'+T.totalOf+cat+'</span><span style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(total,isDesp)+'</span></div>';
  document.getElementById('modal-title').innerHTML =
    '<span style="display:inline-flex;align-items:center;gap:8px">'+
    '<span style="width:10px;height:10px;border-radius:50%;background:'+color+';display:inline-block"></span>'+cat+'</span>';
  document.getElementById('modal-body').innerHTML =
    '<button class="modal-back" onclick="showCatDetail(\''+type+'\',modalState.months)">&#8592; '+T.backToCategories+'</button>'+
    (rows?rows+totalRow:'<p style="color:#aaa;font-size:13px;padding:8px 0">'+T.noPayments+'</p>');
}

function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-overlay').classList.add('hidden');modalState=null;}

// ---- RENDER ----
function render() {
  destroyCharts();
  document.getElementById('main').innerHTML = activeTab==='Resum'?renderResume():renderMonth(activeTab);
  requestAnimationFrame(()=>{
    if (activeTab!=='Resum') { bindInvButtons(activeTab); }
    if (activeTab==='Resum') {
      const yearMonths = getMonthsForYear(activeYear);
      initBarChart();
      initPieChart('pieDesp', getByCat(collectAllForType(yearMonths,'desp')), CAT_COLORS);
      initPieChart('pieIng', getByCat(collectAllForType(yearMonths,'ing')), ING_COLORS);
    } else {
      const d=appData[activeTab]||{ing:[],desp:[],inv:[]};
      if(d.desp.length)initPieChart('pieMonthDesp',getByCat(d.desp),CAT_COLORS);
      if(d.ing.length)initPieChart('pieMonthIng',getByCat(d.ing),ING_COLORS);
    }
  });
}

  const totalIng=md.reduce((a,b)=>a+b.ing,0);

        '<td class="amount red">-'+fmt(m.desp)+'</td>'+

  const netBal2=balance-tInvNet;
  return (investEnabled?
    '<div class="metric-grid">'+
      '<div class="metric"><div class="metric-label">'+T.totalIncome+'</div><div class="metric-value green">+'+fmt(totalIng)+'</div></div>'+

      '<div class="metric"><div class="metric-label">'+T.totalInvested+'</div><div class="metric-value" style="color:#0f6e56">'+fmt(tInvNet)+'</div></div>'+
      '<div class="metric"><div class="metric-label">'+T.netBalance+'</div><div class="metric-value '+(netBal2>=0?'blue':'red')+'">'+(netBal2>=0?'+':'')+fmt(netBal2)+'</div></div>'+
    '</div>':
    '<div class="metric-grid">'+
      '<div class="metric"><div class="metric-label">'+T.totalIncome+'</div><div class="metric-value green">+'+fmt(totalIng)+'</div></div>'+
      '<div class="metric"><div class="metric-label">'+T.totalExpenses+'</div><div class="metric-value red">-'+fmt(totalDesp)+'</div></div>'+
      '<div class="metric"><div class="metric-label">'+T.annualBalance+'</div><div class="metric-value '+(balance>=0?'blue':'red')+'">'+(balance>=0?'+':'')+fmt(balance)+'</div></div>'+
    '</div>')+
  '<div class="panel" style="margin-bottom:14px">'+
    '<div class="panel-title" style="margin-bottom:12px">'+T.monthlyChart+'</div>'+
    '<div class="bar-chart-outer"><div class="bar-chart-inner"><canvas id="barChart" role="img" aria-label="'+T.monthlyChart+'">'+T.monthlyChart+'</canvas></div></div>'+
  '</div>'+
  '<div class="two-col">'+
    '<div class="panel">'+
      '<div class="panel-title" style="margin-bottom:12px">'+T.annualSummary+'</div>'+
      '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">'+
      (investEnabled?'<table><tr><th>Mes</th><th style="text-align:right">'+T.income+'</th><th style="text-align:right">'+T.expenses+'</th><th style="text-align:right">'+T.invested+'</th><th style="text-align:right">'+T.netBalance+'</th></tr>':'<table><tr><th>Mes</th><th style="text-align:right">'+T.income+'</th><th style="text-align:right">'+T.expenses+'</th><th style="text-align:right">'+T.balance+'</th></tr>')+
      rows+
      '<tr style="border-top:2px solid #f0f0f0"><td style="font-weight:600">'+T.total+'</td>'+
        '<td class="amount green">+'+fmt(totalIng)+'</td>'+
        '<td class="amount red">-'+fmt(totalDesp)+'</td>'+
        (investEnabled?
          '<td class="amount" style="color:#0f6e56">'+fmt(tInvNet)+'</td>'+
          '<td class="amount '+(netBal2>=0?'blue':'red')+'">'+(netBal2>=0?'+':'')+fmt(netBal2)+'</td>':

function makeRows(entries, type, sheet) {
  const isDesp=type==='desp';
  const colorMap=isDesp?CAT_COLORS:ING_COLORS;
  if(!entries.length)return '<tr><td colspan="4" style="color:#bbb;font-size:12px;padding:10px 8px">'+(isDesp?T.noExpenses:T.noIncome)+'</td></tr>';
  return entries.map((r,i)=>'<tr>'+
    '<td><span class="cat-pill" style="background:'+(colorMap[r.cat]||'#888')+'22;color:'+(colorMap[r.cat]||'#888')+'">'+r.cat+'</span></td>'+
    '<td class="amount '+(isDesp?'red':'green')+'">'+(isDesp?'-':'+')+fmt(r.amount)+'</td>'+
    '<td class="ref-col"><span class="ref-text">'+(r.ref||'')+'</span>'+(r.date?'<span class="ref-date">'+r.date+'</span>':'')+'</td>'+
    '<td><button class="del-btn" onclick="deleteEntry(\''+sheet+'\',\''+type+'\','+i+')">&#x2715;</button></td>'+
  '</tr>').join('');
}

function renderInvSection(sheet,inv){
  const cats=Object.keys(INV_COLORS);

      const col=INV_COLORS[r.cat]||'#888';

        '<td><span class="cat-pill" style="background:'+col+'22;color:'+col+'">'+r.cat+'</span></td>'+
        '<td style="padding:7px 8px;vertical-align:middle"><span style="padding:2px 8px;border-radius:99px;font-size:11px;background:'+(isSell?'#f0fdf4':'#fff7ed')+';color:'+(isSell?'#16a34a':'#ea580c')+'">'+(isSell?T.sell:T.buy)+'</span></td>'+
        '<td class="amount" style="color:'+(isSell?'#16a34a':'#0f6e56')+'">'+(isSell?'+':'')+fmt(r.amount)+'</td>'+
        '<td class="ref-col"><span class="ref-text">'+(r.ref||'')+'</span>'+(r.date?'<span class="ref-date">'+r.date+'</span>':'')+'</td>'+
        '<td><button class="del-btn inv-del-btn" data-idx="'+i+'">&#x2715;</button></td>'+

    });

    rows='<tr><td colspan="5" style="color:#bbb;font-size:12px;padding:10px 8px">'+T.noInv+'</td></tr>';

  const tot=inv.length?'<tr style="border-top:2px solid #f0f0f0"><td colspan="2" style="font-weight:600">'+T.total+'</td><td class="amount" style="color:#0f6e56">'+fmt(net)+'</td><td colspan="2"></td></tr>':'';

    '<div class="panel-title" style="margin-bottom:12px">'+T.investments+'</div>'+

    rows+tot+'</table>'+
    '<div style="margin-top:10px"><button class="add-btn" id="inv-add-btn">+ '+T.investments+'</button></div>'+
    '<div id="inv-form" class="hidden"><div class="form-row">'+
      '<select id="inv-cat">'+catOpts+'</select>'+
      '<select id="inv-op"><option value="buy">'+T.buy+'</option><option value="sell">'+T.sell+'</option></select>'+
      '<input type="number" id="inv-amt" placeholder="EUR" step="0.01" min="0.01">'+
      '<input type="text" id="inv-ref" placeholder="'+T.reference+'">'+
      '<button class="save-btn" id="inv-save-btn">'+T.save+'</button>'+
      '<button class="cancel-btn" id="inv-cancel-btn">&#x2715;</button>'+
    '</div></div></div>';
}

function bindInvButtons(sheet){
  var addBtn=document.getElementById('inv-add-btn');
  if(addBtn) addBtn.onclick=function(){toggleForm('inv-form');};
  var saveBtn=document.getElementById('inv-save-btn');
  if(saveBtn) saveBtn.onclick=function(){addInvestment(sheet);};
  var cancelBtn=document.getElementById('inv-cancel-btn');
  if(cancelBtn) cancelBtn.onclick=function(){toggleForm('inv-form');};
  document.querySelectorAll('.inv-del-btn').forEach(function(btn){
    btn.onclick=function(){deleteInvestment(sheet,parseInt(this.getAttribute('data-idx')));};
  });
}


function initBarChart() {
  const el=document.getElementById('barChart');if(!el)return;
  const active=getMonthsForYear(activeYear).filter(m=>sum(appData[m]&&appData[m].ing)>0||sum(appData[m]&&appData[m].desp)>0);
  // On mobile: show 4 months visible, rest scrollable
  // Each month group = container_width/4, total = numMonths * that
  const isMobile = window.innerWidth <= 700;
  if (isMobile && active.length > 0) {
    const containerW = document.querySelector('.bar-chart-outer').offsetWidth || window.innerWidth;
    const perBar = Math.floor(containerW / 4); // 4 bars visible
    el.parentElement.style.minWidth = (active.length * perBar) + 'px';
  } else {
    el.parentElement.style.minWidth = '';
  }
  const activeMonths = getMonthsForYear(activeYear);
  const invDataset = investEnabled ? [{
    label:T.investments,
    data:active.map(m=>{
      const inv=(appData[m]?.inv||[]).reduce((a,r)=>a+(r.opType==='sell'?-r.amount:r.amount),0);
      return +inv.toFixed(2);
    }),
    backgroundColor:'#0f6e5655',borderColor:'#0f6e56',borderWidth:1.5
  }] : [];
  charts['bar']=new Chart(el,{
    type:'bar',
    data:{labels:active.map(m=>T.months[activeMonths.indexOf(m)]),datasets:[
      {label:T.income,data:active.map(m=>+sum(appData[m]&&appData[m].ing).toFixed(2)),backgroundColor:'#16a34a55',borderColor:'#16a34a',borderWidth:1.5},
      {label:T.expenses,data:active.map(m=>+sum(appData[m]&&appData[m].desp).toFixed(2)),backgroundColor:'#dc262655',borderColor:'#dc2626',borderWidth:1.5},
      ...invDataset
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:12},color:'#666'}}},
      scales:{x:{ticks:{autoSkip:false,color:'#888',font:{size:11}}},y:{ticks:{color:'#888',font:{size:11},callback:v=>v+'€'}}}
    }
  });
}

function initPieChart(id,catData,colorMap) {
  const el=document.getElementById(id);if(!el||!catData.length)return;
  const top=catData.slice(0,10);
  charts[id]=new Chart(el,{
    type:'doughnut',
    data:{labels:top.map(x=>x[0]),datasets:[{data:top.map(x=>+x[1].toFixed(2)),backgroundColor:top.map(x=>colorMap[x[0]]||'#888'),borderWidth:1.5,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},color:'#666',boxWidth:12,padding:8}}}}
  });
}

function showToast(msg,isError) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=isError?'show error':'show';
  setTimeout(()=>{t.className='';},3000);
}
</script>
</body>
</html>
