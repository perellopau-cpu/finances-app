* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

/* AUTH */
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-card { background: white; border-radius: 16px; border: 1px solid #e5e5e5; padding: 32px; width: 100%; max-width: 380px; }
.auth-logo { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
.auth-sub { font-size: 14px; color: #888; margin-bottom: 28px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
.auth-tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; cursor: pointer; background: white; border: none; color: #666; transition: all 0.15s; }
.auth-tab.active { background: #2563eb; color: white; font-weight: 500; }
.auth-field { margin-bottom: 14px; }
.auth-field label { display: block; font-size: 12px; font-weight: 500; color: #666; margin-bottom: 5px; }
.auth-field input { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 16px; color: #1a1a1a; background: white; }
.auth-field input:focus { outline: none; border-color: #2563eb; }
.auth-btn { width: 100%; background: #2563eb; color: white; border: none; padding: 11px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; }
.auth-btn:hover { background: #1d4ed8; }
.auth-btn:disabled { opacity: 0.6; pointer-events: none; }
.auth-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
.auth-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }

/* APP */
header { background: white; border-bottom: 1px solid #e5e5e5; padding: 0 20px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 0; }
h1 { font-size: 18px; font-weight: 600; }
.header-btns { display: flex; gap: 6px; }
.sync-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #666; }
.sync-btn:hover { background: #f5f5f5; }
.sync-btn:disabled { opacity: 0.5; pointer-events: none; }
.cfg-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 16px; color: #666; }
.cfg-btn:hover { background: #f5f5f5; }
.logout-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #888; }
.logout-btn:hover { background: #f5f5f5; color: #dc2626; }

.tabs { display: flex; gap: 2px; overflow-x: auto; padding: 8px 0 0; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border: none; background: none; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: all 0.15s; }
.tab:hover { color: #1a1a1a; }
.tab.active { color: #1a1a1a; border-bottom-color: #2563eb; font-weight: 500; }

main { max-width: 960px; margin: 0 auto; padding: 20px 16px; }
#loader { text-align: center; padding: 60px 20px; color: #888; }
.spinner { width: 32px; height: 32px; border: 3px solid #e5e5e5; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.metric { background: white; border-radius: 10px; padding: 14px 12px; border: 1px solid #e5e5e5; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 6px; }
.metric-value { font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media (max-width: 400px) { .metric-value { font-size: 15px; } }
.green { color: #16a34a; } .red { color: #dc2626; } .blue { color: #2563eb; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } .metric-grid { gap: 8px; } }
.panel { background: white; border-radius: 10px; border: 1px solid #e5e5e5; padding: 16px; }
.panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.panel-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }

table { width: 100%; font-size: 13px; border-collapse: collapse; }
th { text-align: left; color: #888; font-weight: 400; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
td { padding: 7px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
tr:last-child td { border-bottom: none; }
td.amount { text-align: right; font-weight: 600; font-size: 13px; white-space: nowrap; vertical-align: middle; }
td.ref-col { color: #1a1a1a; font-size: 12px; max-width: 160px; }
.ref-text { display: block; color: #1a1a1a; }
.ref-date { display: block; font-size: 11px; color: #bbb; margin-top: 2px; }
.cat-pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; vertical-align: middle; }
.del-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 13px; padding: 0 4px; transition: color 0.1s; }
tr:hover .del-btn { color: #bbb; }
.del-btn:hover { color: #dc2626 !important; }

.add-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #444; }
.add-btn:hover { background: #f9f9f9; }
.detail-btn { background: none; border: 1px solid #e5e5e5; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #666; white-space: nowrap; }
.detail-btn:hover { background: #f5f5f5; }

.form-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
.form-row select, .form-row input { flex: 1; min-width: 90px; font-size: 16px; padding: 7px 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #1a1a1a; }
.save-btn { background: #2563eb; color: white; border: none; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; }
.save-btn:hover { background: #1d4ed8; }
.save-btn:disabled { opacity: 0.5; pointer-events: none; }
.cancel-btn { background: none; border: 1px solid #e0e0e0; color: #888; padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
.hidden { display: none; }

.bar-chart-outer { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.bar-chart-inner { height: 250px; }
.chart-wrap { position: relative; width: 100%; height: 210px; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.hidden { display: none; }
.modal { background: white; border-radius: 14px; width: 100%; max-width: 440px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; border-radius: 14px 14px 0 0; }
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; padding: 2px 6px; border-radius: 6px; line-height: 1; }
.modal-close:hover { background: #f5f5f5; color: #1a1a1a; }
.modal-body { padding: 8px 20px 20px; overflow-y: auto; flex: 1; }
.modal-back { background: none; border: none; color: #2563eb; font-size: 13px; cursor: pointer; padding: 8px 0 4px; display: flex; align-items: center; gap: 4px; }

.cat-detail-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; border-radius: 6px; }
.cat-detail-row:hover { background: #f9f9f9; }
.cat-detail-row:last-of-type { border-bottom: none; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-detail-name { flex: 1; font-size: 13px; }
.cat-detail-meta { font-size: 11px; color: #aaa; margin-right: 4px; white-space: nowrap; }
.cat-detail-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
.cat-detail-arrow { color: #ccc; font-size: 13px; flex-shrink: 0; }
.modal-total { display: flex; justify-content: space-between; padding: 12px 0 4px; border-top: 1px solid #e5e5e5; margin-top: 4px; font-weight: 600; font-size: 14px; }
.payment-row { padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
.payment-row:last-child { border-bottom: none; }
.payment-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.payment-ref { font-size: 13px; color: #1a1a1a; flex: 1; }
.payment-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
.payment-date { font-size: 11px; color: #bbb; margin-top: 3px; }

.cfg-add-row input[type="color"] { width: 40px; height: 36px; padding: 2px 3px; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; }
.cfg-edit-form { background: #f9f9f9; border-radius: 8px; padding: 10px; margin-top: 4px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.cfg-edit-form input[type="text"] { flex: 1; min-width: 100px; font-size: 16px; padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 6px; background: white; }
.cfg-edit-form input[type="color"] { width: 36px; height: 32px; padding: 2px 3px; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; }
.lang-selector { display: flex; gap: 8px; margin-bottom: 20px; }
.lang-btn { flex: 1; padding: 8px; border: 1px solid #e5e5e5; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; color: #666; }
.lang-btn:hover { background: #f5f5f5; }
.lang-btn.active { border-color: #2563eb; color: #2563eb; font-weight: 600; background: #eff6ff; }
.cfg-sync-note { font-size: 12px; color: #aaa; padding: 6px 0 2px; text-align: center; }
.user-email { font-size: 12px; color: #888; padding: 8px 0 14px; border-bottom: 1px solid #f0f0f0; margin-bottom: 16px; }

#toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: white; padding: 10px 18px; border-radius: 10px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; max-width: 280px; }
#toast.show { opacity: 1; }
#toast.error { background: #dc2626; }

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">💰 Finances</div>
    <div class="auth-sub">Gestiona les teves finances personals</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Registrar-se</button>
    </div>
    <div id="auth-error" class="auth-error hidden"></div>
    <div id="auth-success" class="auth-success hidden"></div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="el-teu@email.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label>Contrasenya</label>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="auth-field hidden" id="confirm-field">
      <label>Confirmar contrasenya</label>
      <input type="password" id="auth-confirm" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="hidden">
  <header>
    <div class="header-top">
      <h1 id="app-title">Finances Personals</h1>
      <div class="header-btns">
        <button class="sync-btn" id="sync-btn" onclick="loadData()">Sincronitzar</button>
        <button class="cfg-btn" onclick="openCfgModal()" title="Configuració">&#9881;</button>
        <button class="logout-btn" onclick="handleLogout()" title="Tancar sessió">&#x2192;</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </header>
  <main id="main">
    <div id="loader"><div class="spinner"></div><p>Carregant...</p></div>
  </main>
</div>

<div id="toast"></div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModalDirect()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="modal-overlay hidden" id="cfg-overlay" onclick="closeCfgOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:480px">
    <div class="modal-header">
      <h3 id="cfg-title">Configuració</h3>
      <button class="modal-close" onclick="document.getElementById('cfg-overlay').classList.add('hidden')">&#x2715;</button>
    </div>
    <div class="modal-body" id="cfg-body"></div>
  </div>
</div>

    defaultCatDesp:{'Supermarket':'#3266ad','Restaurant':'#e07b39','Alcohol':'#c0392b','Transport':'#8e44ad','Health & sport':'#27ae60','Clothes & accessories':'#e91e8c','Subscriptions':'#16a085','Pharmacy':'#2980b9','Accommodation':'#f39c12','Tickets':'#9b59b6','Taxes':'#7f8c8d','Education':'#1abc9c','Haircut':'#e74c3c','Tobacco':'#95a5a6','Others':'#bdc3c7'},
    defaultCatIng:{'Worldpackers':'#1D9E75','Family':'#185FA5','Unemployment':'#BA7517','UGC':'#8e44ad','YouTube':'#c0392b','Others':'#888'}
  }
};

const CAT_TRANS = [
  ['Supermercat','Supermercado','Supermarket'],['Restaurant','Restaurante','Restaurant'],
  ['Alcohol','Alcohol','Alcohol'],['Transport','Transporte','Transport'],
  ['Salut i esport','Salud y deporte','Health & sport'],['Roba o accesoris','Ropa o accesorios','Clothes & accessories'],
  ['Subscripcions','Suscripciones','Subscriptions'],['Farmàcia','Farmacia','Pharmacy'],
  ['Allotjament','Alojamiento','Accommodation'],['Entrades','Entradas','Tickets'],
  ['Impostos','Impuestos','Taxes'],['Formació','Formación','Education'],
  ['Perruqueria','Peluquería','Haircut'],['Tabac','Tabaco','Tobacco'],['Altres','Otros','Others'],
];
const ING_TRANS = [
  ['Worldpackers','Worldpackers','Worldpackers'],['Família','Familia','Family'],
  ['Atur','Paro','Unemployment'],['UGC','UGC','UGC'],['YouTube','YouTube','YouTube'],['Altres','Otros','Others'],
];
const LANG_IDX = {ca:0,es:1,en:2};

function translateCat(cat,from,to){
  if(from===to)return cat;
  const fi=LANG_IDX[from],ti=LANG_IDX[to];
  for(const r of CAT_TRANS){if(r[fi]===cat)return r[ti];}
  for(const r of ING_TRANS){if(r[fi]===cat)return r[ti];}
  return cat;
}
function translateColorMap(cm,from,to){
  if(from===to)return cm;
  const nm={};
  Object.entries(cm).forEach(([c,col])=>{nm[translateCat(c,from,to)]=col;});
  return nm;
}
function translateAllData(from,to){
  if(from===to)return;
  ALL_MONTHS.forEach(m=>{
    if(!appData[m])return;
    appData[m].desp.forEach(r=>{r.cat=translateCat(r.cat,from,to);});
    appData[m].ing.forEach(r=>{r.cat=translateCat(r.cat,from,to);});
  });
}

const ALL_MONTHS=['Gen2026','Feb2026','Març2026','Abril2026','Maig2026','Juny2026','Jul2026','Ago2026','Set2026','Oct2026','Nov2026','Des2026'];

let currentLang=localStorage.getItem('appLang')||'ca';
let T=TRANSLATIONS[currentLang];
let CAT_COLORS=Object.assign({},T.defaultCatDesp);
let ING_COLORS=Object.assign({},T.defaultCatIng);
let appData={};
let activeTab='Resum2026';
let charts={};
let currentUser=null;
let modalState=null;
let authMode='login';

// ---- AUTH ----
function switchAuthTab(mode){
  authMode=mode;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='register')));
  document.getElementById('confirm-field').classList.toggle('hidden',mode==='login');
  document.getElementById('auth-btn').textContent=mode==='login'?'Entrar':'Crear compte';
  document.getElementById('auth-error').classList.add('hidden');
  document.getElementById('auth-success').classList.add('hidden');
}

function showAuthError(msg){
  const el=document.getElementById('auth-error');
  el.textContent=msg;el.classList.remove('hidden');
}
function showAuthSuccess(msg){
  const el=document.getElementById('auth-success');
  el.textContent=msg;el.classList.remove('hidden');
}

async function handleAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-password').value;
  const btn=document.getElementById('auth-btn');
  document.getElementById('auth-error').classList.add('hidden');
  document.getElementById('auth-success').classList.add('hidden');

  if(!email||!pass){showAuthError('Omple tots els camps');return;}
  if(pass.length<6){showAuthError('La contrasenya ha de tenir mínim 6 caràcters');return;}

  if(authMode==='register'){
    const confirm=document.getElementById('auth-confirm').value;
    if(pass!==confirm){showAuthError('Les contrasenyes no coincideixen');return;}
  }

  btn.disabled=true;
  btn.textContent=authMode==='login'?'Entrant...':'Creant compte...';

  try{
    let result;
    if(authMode==='login'){
      result=await sb.auth.signInWithPassword({email,password:pass});
    }else{
      result=await sb.auth.signUp({email,password:pass});
    }
    if(result.error)throw result.error;
    if(authMode==='register'&&result.data.user&&!result.data.session){
      showAuthSuccess('Compte creat! Revisa el teu email per confirmar el registre.');
      btn.disabled=false;btn.textContent='Crear compte';
    }
  }catch(err){
    showAuthError(err.message);
    btn.disabled=false;
    btn.textContent=authMode==='login'?'Entrar':'Crear compte';
  }
}

async function handleLogout(){
  await sb.auth.signOut();
  currentUser=null;appData={};
  document.getElementById('app-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
}

// ---- INIT ----
window.onload=async()=>{
  T=TRANSLATIONS[currentLang];
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    currentUser=session.user;
    showApp();
  }
  sb.auth.onAuthStateChange((_,session)=>{
    if(session&&!currentUser){
      currentUser=session.user;
      showApp();
    }
  });
  document.getElementById('auth-email').addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});
  document.getElementById('auth-password').addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});
};

async function showApp(){
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  document.getElementById('app-title').textContent=T.appTitle;
  document.getElementById('sync-btn').textContent=T.sync;
  document.getElementById('cfg-title').textContent=T.configTitle;
  buildTabs();
  await loadData();
}

// ---- DATA ----
function getAllLabels(){
  const l={'Resum2026':T.tabSummary};
  ALL_MONTHS.forEach((m,i)=>{l[m]=T.monthAbr[i];});
  return l;
}
function fmt(n){return n.toFixed(2)+'€';}
function fmtSign(n,isDesp){return(isDesp?'-':'+')+fmt(n);}
function sum(arr){return(arr||[]).reduce((a,b)=>a+b.amount,0);}
function getByCat(arr){const m={};(arr||[]).forEach(r=>{m[r.cat]=(m[r.cat]||0)+r.amount;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);}
function getCountByCat(arr){const m={};(arr||[]).forEach(r=>{if(!m[r.cat])m[r.cat]={total:0,count:0,items:[]};m[r.cat].total+=r.amount;m[r.cat].count++;m[r.cat].items.push(r);});return Object.entries(m).sort((a,b)=>b[1].total-a[1].total);}
function collectAllForType(months,type){const all=[];months.forEach(m=>(appData[m]&&appData[m][type]||[]).forEach(r=>all.push(r)));return all;}
function destroyCharts(){Object.values(charts).forEach(c=>c.destroy());charts={};}
function toggleForm(id){document.getElementById(id).classList.toggle('hidden');}
function todayStr(){const d=new Date();return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();}

async function loadData(){
  if(!currentUser)return;
  const btn=document.getElementById('sync-btn');
  btn.disabled=true;btn.textContent=T.syncing;
  try{
    // Load entries
    const{data:entries,error}=await sb.from('entries').select('*').eq('user_id',currentUser.id);
    if(error)throw error;

    // Load categories
    const{data:cats}=await sb.from('user_categories').select('*').eq('user_id',currentUser.id).single();
    if(cats){
      if(cats.desp_colors&&Object.keys(cats.desp_colors).length>0) CAT_COLORS=translateColorMap(cats.desp_colors,'ca',currentLang);
      if(cats.ing_colors&&Object.keys(cats.ing_colors).length>0)  ING_COLORS=translateColorMap(cats.ing_colors,'ca',currentLang);
    }

    // Organise by month
    appData={};
    ALL_MONTHS.forEach(m=>{appData[m]={ing:[],desp:[]};});
    (entries||[]).forEach(e=>{
      if(!appData[e.month])appData[e.month]={ing:[],desp:[]};
      const cat=translateCat(e.cat,'ca',currentLang);
      appData[e.month][e.type].push({id:e.id,cat,amount:parseFloat(e.amount),ref:e.ref||'',date:e.date||''});
    });

    render();
    showToast(T.synced);
  }catch(err){
    showToast(T.errorDeleting+err.message,true);
    ALL_MONTHS.forEach(m=>{if(!appData[m])appData[m]={ing:[],desp:[]};});
    render();
  }finally{
    btn.disabled=false;btn.textContent=T.sync;
  }
}

async function addEntry(sheet,type){
  const cat=document.getElementById(type+'-cat').value;
  const amt=parseFloat(document.getElementById(type+'-amt').value);
  const ref=document.getElementById(type+'-ref').value;
  const btn=document.getElementById(type+'-save-btn');
  if(!amt||isNaN(amt)||amt<=0){showToast(T.invalidAmount,true);return;}
  btn.disabled=true;btn.textContent=T.save;
  const date=todayStr();
  const catCA=translateCat(cat,currentLang,'ca');
  try{
    const{data,error}=await sb.from('entries').insert({user_id:currentUser.id,month:sheet,type,cat:catCA,amount:amt,ref,date}).select().single();
    if(error)throw error;
    appData[sheet][type].push({id:data.id,cat,amount:amt,ref,date});
    document.getElementById(type+'-amt').value='';
    document.getElementById(type+'-ref').value='';
    render();
    showToast(T.added);
  }catch(err){
    showToast(T.errorSaving+err.message,true);
  }finally{
    btn.disabled=false;btn.textContent=T.save;
  }
}

async function deleteEntry(sheet,type,idx){
  if(!confirm(T.confirmDeleteEntry))return;
  const entry=appData[sheet][type][idx];
  if(!entry)return;
  try{
    const{error}=await sb.from('entries').delete().eq('id',entry.id);
    if(error)throw error;
    appData[sheet][type].splice(idx,1);
    render();
    showToast(T.deleted);
  }catch(err){
    showToast(T.errorDeleting+err.message,true);
  }
}

async function syncCategories(){
  try{
    const despCA=translateColorMap(CAT_COLORS,currentLang,'ca');
    const ingCA=translateColorMap(ING_COLORS,currentLang,'ca');
    await sb.from('user_categories').upsert({user_id:currentUser.id,desp_colors:despCA,ing_colors:ingCA,updated_at:new Date().toISOString()},{onConflict:'user_id'});
  }catch(err){
    showToast(T.errorSyncCats,true);
  }
}

function setLanguage(lang){
  currentLang=lang;T=TRANSLATIONS[lang];

function closeCfgOverlay(e){if(e.target===document.getElementById('cfg-overlay'))document.getElementById('cfg-overlay').classList.add('hidden');}

function renderCfgModal(){

    '<button class="lang-btn'+(currentLang===l?' active':'')+'" onclick="changeLang(\''+l+'\')">'+

function renderCfgSection(type,colorMap,label){
  const rows=Object.entries(colorMap).map(([cat,color])=>
    '<div class="cfg-cat-row" id="cfgrow-'+type+'-'+btoa(unescape(encodeURIComponent(cat)))+'">'+
      '<div class="cfg-cat-dot" style="background:'+color+'"></div>'+
      '<div class="cfg-cat-name">'+cat+'</div>'+
      '<button class="cfg-cat-edit" onclick="editCat(\''+type+'\',\''+cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'+T.edit+'</button>'+
      '<button class="cfg-cat-del" onclick="deleteCat(\''+type+'\',\''+cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">&#x2715;</button>'+
    '</div>'
  ).join('');
  return '<div class="cfg-section"><div class="cfg-section-title">'+label+'</div>'+rows+
    '<div class="cfg-add-row">'+
      '<input type="color" id="new-color-'+type+'" value="#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0')+'">'+
      '<input type="text" id="new-cat-'+type+'" placeholder="'+T.addCategory+'">'+
      '<button class="save-btn" onclick="addCat(\''+type+'\')">'+T.add+'</button>'+
    '</div></div>';
}

function editCat(type,cat){
  const colorMap=type==='desp'?CAT_COLORS:ING_COLORS;
  const color=colorMap[cat]||'#888';
  const rowId='cfgrow-'+type+'-'+btoa(unescape(encodeURIComponent(cat)));
  const row=document.getElementById(rowId);if(!row)return;
  const existing=row.nextElementSibling;
  if(existing&&existing.classList.contains('cfg-edit-form')){existing.remove();return;}
  const form=document.createElement('div');form.className='cfg-edit-form';
  form.innerHTML='<input type="color" id="edit-color-'+type+'" value="'+color+'">'+
    '<input type="text" id="edit-name-'+type+'" value="'+cat+'">'+
    '<button class="save-btn" style="padding:5px 12px;font-size:12px" onclick="saveCatEdit(\''+type+'\',\''+cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'+T.save+'</button>'+
    '<button class="cancel-btn" style="padding:5px 10px;font-size:12px" onclick="this.parentElement.remove()">&#x2715;</button>';
  row.insertAdjacentElement('afterend',form);
}

async function saveCatEdit(type,oldCat){
  const colorMap=type==='desp'?CAT_COLORS:ING_COLORS;
  const newName=document.getElementById('edit-name-'+type).value.trim();
  const newColor=document.getElementById('edit-color-'+type).value;
  if(!newName){showToast(T.catNameEmpty,true);return;}
  delete colorMap[oldCat];colorMap[newName]=newColor;
  ALL_MONTHS.forEach(m=>{if(appData[m]){(type==='desp'?appData[m].desp:appData[m].ing).forEach(r=>{if(r.cat===oldCat)r.cat=newName;});}});
  await syncCategories();renderCfgModal();render();showToast(T.catUpdated);
}

async function deleteCat(type,cat){
  if(!confirm(T.confirmDelete.replace('{{cat}}',cat)))return;
  const colorMap=type==='desp'?CAT_COLORS:ING_COLORS;
  delete colorMap[cat];
  await syncCategories();renderCfgModal();render();showToast(T.catDeleted);
}

async function addCat(type){
  const colorMap=type==='desp'?CAT_COLORS:ING_COLORS;
  const name=document.getElementById('new-cat-'+type).value.trim();
  const color=document.getElementById('new-color-'+type).value;
  if(!name){showToast(T.catEmpty,true);return;}
  if(colorMap[name]){showToast(T.catExists,true);return;}
  colorMap[name]=color;
  await syncCategories();renderCfgModal();render();showToast(T.catAdded);
}

// ---- DETAIL MODAL ----
function showCatDetail(type,months){
  modalState={type,months};
  const isDesp=type==='desp';const colorMap=isDesp?CAT_COLORS:ING_COLORS;
  const allEntries=collectAllForType(months,type);
  const cats=getCountByCat(allEntries);
  const grandTotal=cats.reduce((s,e)=>s+e[1].total,0);
  let rows='';
  cats.forEach(entry=>{
    const cat=entry[0];const v=entry[1];const color=colorMap[cat]||'#888';
    const pct=grandTotal>0?(v.total/grandTotal*100).toFixed(1):0;
    rows+='<div class="cat-detail-row" onclick="showCatPayments(\''+cat.replace(/'/g,"\\'")+'\')">'+
      '<div class="cat-dot" style="background:'+color+'"></div>'+
      '<div class="cat-detail-name">'+cat+'</div>'+
      '<div class="cat-detail-meta">'+v.count+' '+T.reg+' &middot; '+pct+'%</div>'+
      '<div class="cat-detail-amount" style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(v.total,isDesp)+'</div>'+
      '<div class="cat-detail-arrow">&#8250;</div></div>';
  });
  const totalRow=rows?'<div class="modal-total"><span>'+T.total+'</span><span style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(grandTotal,isDesp)+'</span></div>':'';
  document.getElementById('modal-title').textContent=isDesp?T.despByCat:T.ingByCat;
  document.getElementById('modal-body').innerHTML=rows?rows+totalRow:'<p style="color:#aaa;font-size:13px;padding:8px 0">'+T.noData+'</p>';
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function showCatPayments(cat){
  if(!modalState)return;
  const{type,months}=modalState;const isDesp=type==='desp';
  const color=(isDesp?CAT_COLORS:ING_COLORS)[cat]||'#888';
  const allEntries=collectAllForType(months,type).filter(r=>r.cat===cat);
  const total=sum(allEntries);
  let rows='';
  allEntries.forEach(r=>{
    rows+='<div class="payment-row"><div class="payment-top">'+
      '<div class="payment-ref">'+r.ref+'</div>'+
      '<div class="payment-amount" style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(r.amount,isDesp)+'</div>'+
      '</div>'+(r.date?'<div class="payment-date">'+r.date+'</div>':'')+
    '</div>';
  });
  const totalRow='<div class="modal-total"><span>'+T.totalOf+cat+'</span><span style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(total,isDesp)+'</span></div>';
  document.getElementById('modal-title').innerHTML='<span style="display:inline-flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:'+color+';display:inline-block"></span>'+cat+'</span>';
  document.getElementById('modal-body').innerHTML='<button class="modal-back" onclick="showCatDetail(\''+type+'\',modalState.months)">&#8592; '+T.backToCategories+'</button>'+(rows?rows+totalRow:'<p style="color:#aaa;font-size:13px;padding:8px 0">'+T.noPayments+'</p>');
}

  '</div>'+
  '<div class="two-col">'+
    '<div class="panel"><div class="panel-title" style="margin-bottom:12px">'+T.annualSummary+'</div>'+
      '<table><tr><th>Mes</th><th style="text-align:right">'+T.income+'</th><th style="text-align:right">'+T.expenses+'</th><th style="text-align:right">'+T.balance+'</th></tr>'+

        '<td class="amount green">+'+fmt(totalIng)+'</td><td class="amount red">-'+fmt(totalDesp)+'</td>'+

    '<div class="panel" style="display:flex;flex-direction:column;gap:14px">'+
      '<div><div class="panel-header"><div class="panel-title">'+T.distIncome+'</div>'+
      '<button class="detail-btn" onclick="showCatDetail(\'ing\',ALL_MONTHS)">'+T.viewDetail+'</button></div>'+
      '<div class="chart-wrap"><canvas id="pieIng" role="img" aria-label="'+T.distIncome+'">'+T.distIncome+'</canvas></div></div>'+
      '<div><div class="panel-header"><div class="panel-title">'+T.distExpenses+'</div>'+
      '<button class="detail-btn" onclick="showCatDetail(\'desp\',ALL_MONTHS)">'+T.viewDetail+'</button></div>'+
      '<div class="chart-wrap"><canvas id="pieDesp" role="img" aria-label="'+T.distExpenses+'">'+T.distExpenses+'</canvas></div></div>'+
    '</div>'+
  '</div>';
}

function makeRows(entries,type,sheet){
  const isDesp=type==='desp';const colorMap=isDesp?CAT_COLORS:ING_COLORS;
  if(!entries.length)return '<tr><td colspan="4" style="color:#bbb;font-size:12px;padding:10px 8px">'+(isDesp?T.noExpenses:T.noIncome)+'</td></tr>';
  return entries.map((r,i)=>'<tr>'+
    '<td><span class="cat-pill" style="background:'+(colorMap[r.cat]||'#888')+'22;color:'+(colorMap[r.cat]||'#888')+'">'+r.cat+'</span></td>'+
    '<td class="amount '+(isDesp?'red':'green')+'">'+(isDesp?'-':'+')+fmt(r.amount)+'</td>'+
    '<td class="ref-col"><span class="ref-text">'+(r.ref||'')+'</span>'+(r.date?'<span class="ref-date">'+r.date+'</span>':'')+'</td>'+
    '<td><button class="del-btn" onclick="deleteEntry(\''+sheet+'\',\''+type+'\','+i+')">&#x2715;</button></td>'+
  '</tr>').join('');
}

function renderMonth(sheet){
  const d=appData[sheet]||{ing:[],desp:[]};
  const totalIng=sum(d.ing);const totalDesp=sum(d.desp);const balance=totalIng-totalDesp;
  const ingCats=Object.keys(ING_COLORS).map(c=>'<option>'+c+'</option>').join('');
  const despCats=Object.keys(CAT_COLORS).map(c=>'<option>'+c+'</option>').join('');
  return '<div class="metric-grid">'+
    '<div class="metric"><div class="metric-label">'+T.income+'</div><div class="metric-value green">+'+fmt(totalIng)+'</div></div>'+
    '<div class="metric"><div class="metric-label">'+T.expenses+'</div><div class="metric-value red">-'+fmt(totalDesp)+'</div></div>'+
    '<div class="metric"><div class="metric-label">'+T.balance+'</div><div class="metric-value '+(balance>=0?'blue':'red')+'">'+(balance>=0?'+':'')+fmt(balance)+'</div></div>'+
  '</div>'+
  '<div class="two-col">'+
    '<div class="panel"><div class="panel-header"><div class="panel-title">'+T.distIncome+'</div>'+
    '<button class="detail-btn" onclick="showCatDetail(\'ing\',[\''+sheet+'\'])">'+T.viewDetail+'</button></div>'+
    (d.ing.length?'<div class="chart-wrap"><canvas id="pieMonthIng" role="img" aria-label="'+T.distIncome+'">'+T.distIncome+'</canvas></div>':'<p style="font-size:12px;color:#aaa;padding:8px 0">'+T.noData+'</p>')+
    '</div>'+
    '<div class="panel"><div class="panel-header"><div class="panel-title">'+T.distExpenses+'</div>'+
    '<button class="detail-btn" onclick="showCatDetail(\'desp\',[\''+sheet+'\'])">'+T.viewDetail+'</button></div>'+
    (d.desp.length?'<div class="chart-wrap"><canvas id="pieMonthDesp" role="img" aria-label="'+T.distExpenses+'">'+T.distExpenses+'</canvas></div>':'<p style="font-size:12px;color:#aaa;padding:8px 0">'+T.noData+'</p>')+
    '</div>'+
  '</div>'+
  '<div class="two-col" style="margin-top:0">'+
    '<div class="panel"><div class="panel-title" style="margin-bottom:12px">'+T.income+'</div>'+
      '<table><tr><th>'+T.category+'</th><th style="text-align:right">'+T.amount+'</th><th>'+T.reference+'</th><th></th></tr>'+makeRows(d.ing,'ing',sheet)+'</table>'+
      '<div style="margin-top:10px"><button class="add-btn" onclick="toggleForm(\'ing-form\')">'+T.addEntry+'</button></div>'+
      '<div id="ing-form" class="hidden"><div class="form-row">'+
        '<select id="ing-cat">'+ingCats+'</select>'+
        '<input type="number" id="ing-amt" placeholder="'+T.amount+' €" step="0.01" min="0.01">'+
        '<input type="text" id="ing-ref" placeholder="'+T.reference+'">'+
        '<button class="save-btn" id="ing-save-btn" onclick="addEntry(\''+sheet+'\',\'ing\')">'+T.save+'</button>'+
        '<button class="cancel-btn" onclick="toggleForm(\'ing-form\')">&#x2715;</button>'+
      '</div></div></div>'+
    '<div class="panel"><div class="panel-title" style="margin-bottom:12px">'+T.expenses+'</div>'+
      '<table><tr><th>'+T.category+'</th><th style="text-align:right">'+T.amount+'</th><th>'+T.reference+'</th><th></th></tr>'+makeRows(d.desp,'desp',sheet)+'</table>'+
      '<div style="margin-top:10px"><button class="add-btn" onclick="toggleForm(\'desp-form\')">'+T.addEntry+'</button></div>'+
      '<div id="desp-form" class="hidden"><div class="form-row">'+
        '<select id="desp-cat">'+despCats+'</select>'+
        '<input type="number" id="desp-amt" placeholder="'+T.amount+' €" step="0.01" min="0.01">'+
        '<input type="text" id="desp-ref" placeholder="'+T.reference+'">'+
        '<button class="save-btn" id="desp-save-btn" onclick="addEntry(\''+sheet+'\',\'desp\')">'+T.save+'</button>'+
        '<button class="cancel-btn" onclick="toggleForm(\'desp-form\')">&#x2715;</button>'+
      '</div></div></div>'+
  '</div>';
}

function initBarChart(){
  const el=document.getElementById('barChart');if(!el)return;
  const active=ALL_MONTHS.filter(m=>sum(appData[m]&&appData[m].ing)>0||sum(appData[m]&&appData[m].desp)>0);
  const isMobile=window.innerWidth<=700;
  if(isMobile&&active.length>0){
    const containerW=document.querySelector('.bar-chart-outer').offsetWidth||window.innerWidth;
    el.parentElement.style.minWidth=(active.length*Math.floor(containerW/4))+'px';
  }else{el.parentElement.style.minWidth='';}
  charts['bar']=new Chart(el,{
    type:'bar',
    data:{labels:active.map(m=>T.months[ALL_MONTHS.indexOf(m)]),datasets:[
      {label:T.income,data:active.map(m=>+sum(appData[m]&&appData[m].ing).toFixed(2)),backgroundColor:'#16a34a55',borderColor:'#16a34a',borderWidth:1.5},
      {label:T.expenses,data:active.map(m=>+sum(appData[m]&&appData[m].desp).toFixed(2)),backgroundColor:'#dc262655',borderColor:'#dc2626',borderWidth:1.5}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:12},color:'#666'}}},
      scales:{x:{ticks:{autoSkip:false,color:'#888',font:{size:11}}},y:{ticks:{color:'#888',font:{size:11},callback:v=>v+'€'}}}
    }
  });
}

function initPieChart(id,catData,colorMap){
  const el=document.getElementById(id);if(!el||!catData.length)return;
  const top=catData.slice(0,10);
  charts[id]=new Chart(el,{
    type:'doughnut',
    data:{labels:top.map(x=>x[0]),datasets:[{data:top.map(x=>+x[1].toFixed(2)),backgroundColor:top.map(x=>colorMap[x[0]]||'#888'),borderWidth:1.5,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},color:'#666',boxWidth:12,padding:8}}}}
  });
}

function showToast(msg,isError){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=isError?'show error':'show';
  setTimeout(()=>{t.className='';},3000);
}
</script>
</body>
</html>
